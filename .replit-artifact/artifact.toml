kind = "mobile"
previewPath = "/"
title = "D.L. WRIGHT POS"
version = "1.0.0"
id = "artifacts/dl-wright-pos"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21178

[services.development]
run = "pnpm --filter @workspace/dl-wright-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dl-wright-pos", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dl-wright-pos", "run", "serve" ]

[services.env]
PORT = "21178"
BASE_PATH = "/"
